# Application
spring.application.name=accountservice
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/accountdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=test
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.format_sql=true


# Logging
#logging.level.root=INFO
#logging.level.com.account=DEBUG
#logging.level.org.hibernate.SQL=DEBUG
#logging.file.name=logs/account-service.log

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.topic.name=account-data-topic

# Producer Performance & Stability
#spring.kafka.producer.acks=all
#spring.kafka.producer.retries=3
#spring.kafka.producer.batch-size=16384
#spring.kafka.producer.linger-ms=10
#spring.kafka.producer.buffer-memory=33554432

# Connection & Reconnection Settings
#spring.kafka.producer.properties.reconnect.backoff.ms=50
#spring.kafka.producer.properties.reconnect.backoff.max.ms=1000
##spring.kafka.producer.properties.metadata.max.age.ms=300000

# Timeouts
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.connections.max.idle.ms=540000